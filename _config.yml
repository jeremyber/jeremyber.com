# Site settings
title: Jeremy Ber
description: >-
  This website belongs to Jeremy Ber, and he'll mostly be posting 
  about things he likes here. That is not limited to but including
  music, movies, software, technology, video games and occasionally dumb stuff.
  lang: en-US
timezone: US/Chicago
image: assets/img/profile.jpg # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/jeremyber
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Jeremy Ber
  bio: >-
    Hi, I'm Jeremy. Welcome to my website!
  username: jeremyber
  email: jeremydber@gmail.com
  avatar: /assets/img/avatar.jpg

# Url settings
url: "http://jeremyber.com"
baseurl:
permalink: /:title/
google_analytics:
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Build settings
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sass-converter
  - jekyll-sitemap
  - jekyll-postfiles
